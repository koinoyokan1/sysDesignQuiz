<!DOCTYPE html>
<html>

<head>
    <title>All Questions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Quiz Review</h1>
        <p class="subtitle">All Questions & Answers</p>

        <a class="back-btn" href="/quiz">← Back to Quiz</a>
    </div>

    <div class="qa-list">

        {% for item in qa_list %}

            <div class="qa-card">

                <div class="qa-header">
                    <span class="badge">Q{{ loop.index }}</span>
                </div>

                <div class="section">
                    <div class="label">Question</div>
                    <div class="content">{{ item.question }}</div>
                </div>

                <div class="divider"></div>

                <div class="section">
                    <div class="label">Answer</div>
                    <div class="content answer">{{ item.answer }}</div>
                </div>

            </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
