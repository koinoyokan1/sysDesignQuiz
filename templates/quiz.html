<!DOCTYPE html>
<html>

<head>

    <title>Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        rel="stylesheet"
        href="/static/style.css">

</head>

<body>

<div class="container">

    <h1>Quiz</h1>

    <div class="progress">

        Mastered:
        {{ mastered_count }}/{{ total_count }}

    </div>

    <div class="question-box">

        <h2>Question</h2>

        <p style="white-space: pre-wrap;">
            {{ question }}
        </p>

        {% if not show_answer %}

            <button
                id="show-answer-btn"
                onclick="showAnswer()">

                Show Answer

            </button>

            <div
                id="answer-section"
                style="display:none;">

                <h3>Answer</h3>

                <p style="white-space: pre-wrap;">
                    {{ answer }}
                </p>

                <form method="POST">

                    <button
                        id="yes-btn"
                        name="result"
                        value="y">

                        I Got It Right

                    </button>

                    <button
                        id="no-btn"
                        name="result"
                        value="n">

                        I Got It Wrong

                    </button>

                </form>

            </div>

        {% else %}

            <h3>Answer</h3>

            <p style="white-space: pre-wrap;">
                {{ answer }}
            </p>

            <div class="message">

                {{ message }}

            </div>

            <br>

            <button
                id="next-question-btn"
                onclick="window.location.href='/quiz'">

                Next Question

            </button>

        {% endif %}

    </div>
<div class="scratchpad">
    <h3>Scratchpad</h3>
    <textarea
        id="scratchpad"
        placeholder="Write your notes here..."
        style="
            width: 100%;
            height: 150px;
            padding: 10px;
            font-size: 14px;
            resize: vertical;
        "
    ></textarea>
</div>
    <button
        id="all-questions-btn"
        onclick="window.location.href='/all'">

        View All Questions

    </button>
<form method="POST" action="/reset" style="margin-top:10px;">
    <button
        type="submit"
        style="background:red;color:white;padding:8px 12px;border:none;cursor:pointer;">
        Reset Progress
    </button>
</form>
</div>

<script>
function isTypingInInput() {
    const el = document.activeElement;
    if (!el) return false;

    return (
        el.tagName === "TEXTAREA" ||
        el.tagName === "INPUT" ||
        el.isContentEditable
    );
}
let selectedIndex = 0;


// ---------------------------------------------------
// SHOW ANSWER
// ---------------------------------------------------

function showAnswer() {

    document.getElementById(
        "answer-section"
    ).style.display = "block";

    selectedIndex = 1;

    updateSelection();
}


// ---------------------------------------------------
// GET BUTTONS
// ---------------------------------------------------

function getVisibleButtons() {

    const buttons = [];

    const ids = [
        "show-answer-btn",
        "yes-btn",
        "no-btn",
        "next-question-btn",
        "all-questions-btn"
    ];

    ids.forEach(id => {

        const btn =
            document.getElementById(id);

        if (
            btn &&
            btn.offsetParent !== null
        ) {
            buttons.push(btn);
        }
    });

    return buttons;
}


// ---------------------------------------------------
// UPDATE SELECTION
// ---------------------------------------------------

function updateSelection() {

    const buttons =
        getVisibleButtons();

    if (buttons.length === 0) {
        return;
    }

    if (
        selectedIndex >= buttons.length
    ) {
        selectedIndex = 0;
    }

    if (selectedIndex < 0) {

        selectedIndex =
            buttons.length - 1;
    }

    buttons.forEach((btn, index) => {

        if (index === selectedIndex) {

            btn.style.outline =
                "3px solid blue";

            btn.focus();

        } else {

            btn.style.outline =
                "none";
        }
    });
}


// ---------------------------------------------------
// KEYBOARD CONTROLS
// ---------------------------------------------------

document.addEventListener(
    "keydown",
    function(event) {
        if (isTypingInInput()) {
            return;
        }
        const showBtn =
            document.getElementById(
                "show-answer-btn"
            );

        const yesBtn =
            document.getElementById(
                "yes-btn"
            );

        const noBtn =
            document.getElementById(
                "no-btn"
            );

        const nextBtn =
            document.getElementById(
                "next-question-btn"
            );

        // ---------------------------------
        // SPACE
        // SHOW ANSWER
        // ---------------------------------

        if (
            event.code === "Space"
        ) {

            if (
                showBtn &&
                showBtn.offsetParent !== null
            ) {

                event.preventDefault();

                showBtn.click();
            }

            return;
        }

        // ---------------------------------
        // RIGHT ARROW
        // ---------------------------------

// ---------------------------------
// RIGHT ARROW
// ---------------------------------

if (
    event.key === "ArrowRight"
) {

    event.preventDefault();

    // STEP 1
    // if show answer button visible
    // show answer first

    if (
        showBtn &&
        showBtn.offsetParent !== null
    ) {

        showBtn.click();
        return;
    }

    // STEP 2
    // if answer visible
    // mark correct

    if (
        yesBtn &&
        yesBtn.offsetParent !== null
    ) {

        yesBtn.click();
        return;
    }

    // STEP 3
    // next question screen

    if (
        nextBtn &&
        nextBtn.offsetParent !== null
    ) {

        nextBtn.click();
        return;
    }
}

        // ---------------------------------
        // LEFT ARROW
        // ---------------------------------

        if (
            event.key === "ArrowLeft"
        ) {

            event.preventDefault();

            if (
                noBtn &&
                noBtn.offsetParent !== null
            ) {

                noBtn.click();
                return;
            }
        }

        // ---------------------------------
        // TAB STYLE NAVIGATION
        // ---------------------------------

        if (
            event.key === "ArrowDown"
        ) {

            selectedIndex++;

            updateSelection();
        }

        if (
            event.key === "ArrowUp"
        ) {

            selectedIndex--;

            updateSelection();
        }

        // ---------------------------------
        // ENTER
        // ---------------------------------

        if (
            event.key === "Enter"
        ) {

            event.preventDefault();

            const buttons =
                getVisibleButtons();

            if (
                buttons.length > 0
            ) {

                buttons[
                    selectedIndex
                ].click();
            }
        }
    }
);


// ---------------------------------------------------
// INITIAL LOAD
// ---------------------------------------------------

window.onload = function() {

    selectedIndex = 0;

    updateSelection();
};

</script>
</body>
</html>
